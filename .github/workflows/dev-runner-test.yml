name: Dev Runner Test

on:
  workflow_dispatch:

jobs:
  test-dev-runner:
    name: Test Dev Self-Hosted Runner
    runs-on: [self-hosted, dev]

    steps:
      - name: Print runner info
        run: |
          echo "Runner is working"
          hostname
          whoami
          pwd
          uname -a

      - name: Check private network
        run: |
          ip addr
