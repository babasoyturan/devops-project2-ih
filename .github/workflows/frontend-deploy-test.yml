name: Frontend Deploy Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
      image_tag:
        description: "Frontend Docker image tag"
        required: true
        default: "dev-test"

  push:
    branches:
      - dev
    paths:
      - ".github/workflows/frontend-deploy-test.yml"

jobs:
  deploy-frontend-dev:
    name: Deploy Frontend to Dev
    runs-on: [self-hosted, dev]

    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_SSH_PRIVATE_KEY_VALUE: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'dev-test' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user ansible
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ansible" --version

      - name: Install Ansible collections
        working-directory: config/ansible
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Configure SSH private key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ANSIBLE_SSH_PRIVATE_KEY_VALUE" > ~/.ssh/g6-burger-devops
          chmod 600 ~/.ssh/g6-burger-devops

      - name: Deploy frontend with Ansible
        working-directory: config/ansible
        run: |
          echo "Deploying frontend image tag: $IMAGE_TAG"

          ansible-playbook \
            -i inventories/dev/hosts.yml \
            playbooks/frontend.yml \
            -e deploy_frontend=true \
            -e app_image_tag="$IMAGE_TAG"

      - name: Deployment completed
        run: |
          echo "Frontend deployment workflow completed."
