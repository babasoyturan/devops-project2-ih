# Server Configuration
server.port=${SERVER_PORT:8080}

# Database Configuration (Azure SQL Database)
spring.datasource.url=${DB_URL:jdbc:sqlserver://${DB_HOST:your-server.database.windows.net}:${DB_PORT:1433};database=${DB_NAME:burgerbuilder};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
spring.datasource.username=${DB_USERNAME:your-username}
spring.datasource.password=${DB_PASSWORD:your-password}
spring.datasource.driver-class-name=${DB_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.SQLServerDialect}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# Database initialization
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.schema-locations=${SQL_SCHEMA_LOCATION:classpath:schema.sql}
spring.sql.init.data-locations=${SQL_DATA_LOCATION:classpath:data.sql}

# Logging Configuration
logging.level.com.burgerbuilder=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:WARN}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_DETAILS:when-authorized}
management.health.defaults.enabled=true

# Application Properties
# CORS is handled by CorsConfig.java
