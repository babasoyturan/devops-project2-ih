---
- name: Deploy frontend application
  when: deploy_frontend | default(false) | bool
  block:
    - name: Ensure frontend deployment directory exists
      ansible.builtin.file:
        path: "{{ frontend_deploy_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Check whether Azure CLI is installed
      ansible.builtin.command: which az
      register: azure_cli_check
      changed_when: false
      failed_when: false

    - name: Install Azure CLI
      ansible.builtin.shell: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | bash
      args:
        executable: /bin/bash
      when: azure_cli_check.rc != 0

    - name: Login to Azure using VM managed identity
      ansible.builtin.command: az login --identity --allow-no-subscriptions
      changed_when: false
      no_log: true

    - name: Login Docker to Azure Container Registry using managed identity
      ansible.builtin.command: az acr login --name "{{ acr_name }}"
      changed_when: false

    - name: Render frontend Docker Compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ frontend_deploy_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Pull frontend Docker image
      ansible.builtin.command: docker compose pull
      args:
        chdir: "{{ frontend_deploy_dir }}"
      changed_when: true

    - name: Start frontend container
      ansible.builtin.command: docker compose up -d --force-recreate
      args:
        chdir: "{{ frontend_deploy_dir }}"
      changed_when: true

    - name: Show frontend container status
      ansible.builtin.command: docker ps --filter "name=burger-frontend"
      changed_when: false
